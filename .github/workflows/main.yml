name: Build Debug APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Unzip project
      run: unzip nowinandroid-main.zip
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Grant execute permission
      run: chmod +x nowinandroid-main/gradlew
    - name: Build APK
      run: cd nowinandroid-main && ./gradlew assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: nowinandroid-main/app/build/outputs/**/*.apk
